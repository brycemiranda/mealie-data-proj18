version: '3.8'

services:
  postgres:
    image: postgres:15
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mealie -d mealie_ml"]
      interval: 5s
      timeout: 3s
      retries: 5

  feature_service:
    build: ./feature_service
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  ingestion:
    build: ./ingestion
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
    volumes:
      - ~/.kaggle:/root/.kaggle:ro
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["run_ingestion"]

  generator:
    build: ./generator
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      FEATURE_SERVICE_URL: http://feature_service:8000
    depends_on:
      postgres:
        condition: service_healthy
      feature_service:
        condition: service_started
    profiles: ["run_generator"]

  batch:
    build: ./batch
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["run_batch"]

volumes:
  postgres_data:
